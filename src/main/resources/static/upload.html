<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件上传</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            background: #f8f9ff;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8ebff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #666;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .file-input {
            display: none;
        }

        .file-info {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            display: none;
        }

        .file-info.show {
            display: block;
        }

        .file-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .file-size {
            color: #666;
            font-size: 14px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .usage-selector {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 8px;
            border: 1px solid #e0e0ff;
        }

        .usage-selector-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .usage-options {
            display: flex;
            gap: 20px;
        }

        .usage-options label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #555;
            cursor: pointer;
            font-size: 14px;
        }

        .usage-options input {
            accent-color: #667eea;
        }

        .progress-container {
            margin-top: 20px;
            display: none;
        }

        .progress-container.show {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .result-message {
            font-weight: 600;
            margin-bottom: 10px;
        }

        .result-details {
            font-size: 14px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }

        .result-details pre {
            background: rgba(0, 0, 0, 0.05);
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📤 文件上传</h1>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">点击选择文件或拖拽文件到此处</div>
            <div style="color: #999; font-size: 14px; margin-top: 5px;">支持单个或多个文件</div>
        </div>
        
        <input type="file" id="fileInput" class="file-input" multiple>
        
        <div class="file-info" id="fileInfo">
            <div class="file-name" id="fileName"></div>
            <div class="file-size" id="fileSize"></div>
        </div>

        <div class="usage-selector">
            <div class="usage-selector-title">请选择用途</div>
            <div class="usage-options">
                <label>
                    <input type="radio" name="usage" value="audio" checked>
                    听力音频（上传到音频桶）
                </label>
                <label>
                    <input type="radio" name="usage" value="print">
                    打印文件（上传到打印桶）
                </label>
            </div>
        </div>
        
        <button class="btn" id="uploadBtn" disabled>上传文件</button>
        
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
        
        <div class="result" id="result"></div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const uploadBtn = document.getElementById('uploadBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const result = document.getElementById('result');
        const usageInputs = document.querySelectorAll('input[name="usage"]');

        let selectedFiles = [];
        function getSelectedUsage() {
            const checked = Array.from(usageInputs).find(input => input.checked);
            return checked ? checked.value : 'audio';
        }


        // Click to select file
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = Array.from(e.dataTransfer.files);
            handleFiles(files);
        });

        // File input change
        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            handleFiles(files);
        });

        function handleFiles(files) {
            selectedFiles = files;
            
            if (files.length === 0) {
                fileInfo.classList.remove('show');
                uploadBtn.disabled = true;
                return;
            }

            // Display file info
            if (files.length === 1) {
                const file = files[0];
                fileName.textContent = `文件名: ${file.name}`;
                fileSize.textContent = `大小: ${formatFileSize(file.size)}`;
            } else {
                fileName.textContent = `已选择 ${files.length} 个文件`;
                const totalSize = files.reduce((sum, file) => sum + file.size, 0);
                fileSize.textContent = `总大小: ${formatFileSize(totalSize)}`;
            }
            
            fileInfo.classList.add('show');
            uploadBtn.disabled = false;
            result.classList.remove('show');
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        // Upload button click
        uploadBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) return;

            uploadBtn.disabled = true;
            progressContainer.classList.add('show');
            progressFill.style.width = '0%';
            result.classList.remove('show');

            try {
                if (selectedFiles.length === 1) {
                    // Single file upload
                    await uploadSingleFile(selectedFiles[0]);
                } else {
                    // Multiple files upload
                    await uploadMultipleFiles(selectedFiles);
                }
            } catch (error) {
                showResult(false, '上传失败: ' + error.message);
            } finally {
                uploadBtn.disabled = false;
            }
        });

        async function uploadSingleFile(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('usage', getSelectedUsage());

            const xhr = new XMLHttpRequest();

            return new Promise((resolve, reject) => {
                xhr.upload.addEventListener('progress', (e) => {
                    if (e.lengthComputable) {
                        const percentComplete = (e.loaded / e.total) * 100;
                        progressFill.style.width = percentComplete + '%';
                    }
                });

                xhr.addEventListener('load', () => {
                    progressFill.style.width = '100%';
                    setTimeout(() => {
                        progressContainer.classList.remove('show');
                    }, 500);

                    if (xhr.status === 200) {
                        try {
                            const response = JSON.parse(xhr.responseText);
                            if (response.success) {
                                showResult(true, '上传成功！', response);
                                // Reset file input
                                fileInput.value = '';
                                selectedFiles = [];
                                fileInfo.classList.remove('show');
                            } else {
                                showResult(false, response.error || '上传失败', response);
                            }
                            resolve(response);
                        } catch (e) {
                            showResult(false, '响应解析失败', { raw: xhr.responseText });
                            reject(new Error('响应解析失败'));
                        }
                    } else {
                        showResult(false, `上传失败: HTTP ${xhr.status}`);
                        reject(new Error(`HTTP ${xhr.status}`));
                    }
                });

                xhr.addEventListener('error', () => {
                    progressContainer.classList.remove('show');
                    showResult(false, '网络错误，请检查连接');
                    reject(new Error('网络错误'));
                });

                xhr.open('POST', '/api/upload/file');
                xhr.send(formData);
            });
        }

        async function uploadMultipleFiles(files) {
            const formData = new FormData();
            files.forEach(file => {
                formData.append('files', file);
            });
            formData.append('usage', getSelectedUsage());

            const xhr = new XMLHttpRequest();

            return new Promise((resolve, reject) => {
                xhr.upload.addEventListener('progress', (e) => {
                    if (e.lengthComputable) {
                        const percentComplete = (e.loaded / e.total) * 100;
                        progressFill.style.width = percentComplete + '%';
                    }
                });

                xhr.addEventListener('load', () => {
                    progressFill.style.width = '100%';
                    setTimeout(() => {
                        progressContainer.classList.remove('show');
                    }, 500);

                    if (xhr.status === 200) {
                        try {
                            const response = JSON.parse(xhr.responseText);
                            if (response.success) {
                                showResult(true, response.message || '上传成功！', response);
                                // Reset file input
                                fileInput.value = '';
                                selectedFiles = [];
                                fileInfo.classList.remove('show');
                            } else {
                                showResult(false, response.error || '上传失败', response);
                            }
                            resolve(response);
                        } catch (e) {
                            showResult(false, '响应解析失败', { raw: xhr.responseText });
                            reject(new Error('响应解析失败'));
                        }
                    } else {
                        showResult(false, `上传失败: HTTP ${xhr.status}`);
                        reject(new Error(`HTTP ${xhr.status}`));
                    }
                });

                xhr.addEventListener('error', () => {
                    progressContainer.classList.remove('show');
                    showResult(false, '网络错误，请检查连接');
                    reject(new Error('网络错误'));
                });

                xhr.open('POST', '/api/upload/files');
                xhr.send(formData);
            });
        }

        function showResult(success, message, details = null) {
            result.className = 'result ' + (success ? 'success' : 'error') + ' show';
            result.innerHTML = `
                <div class="result-message">${message}</div>
                ${details ? `
                    <div class="result-details">
                        <strong>详细信息:</strong>
                        <pre>${JSON.stringify(details, null, 2)}</pre>
                    </div>
                ` : ''}
            `;
        }
    </script>
</body>
</html>
